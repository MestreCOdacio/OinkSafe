<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - OINKSAFE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style/login-style.css">
</head>
<body>

    <div class="container-fluid vh-100 p-0">
        <div class="row g-0 h-100">
            
            <div class="col-md-6 d-flex align-items-center justify-content-center bg-white order-2 order-md-1">
                <div class="login-form-container w-100" style="max-width: 450px; padding: 2rem;">
                    
                    <h2 class="fw-bold mb-2">Crie sua conta!</h2>
                    <p class="text-muted mb-4">Comece a cuidar da sua saúde financeira hoje.</p>

                    <form>
                        <div class="mb-3">
                            <label for="nome" class="form-label fw-bold">Nome Completo</label>
                            <input type="text" class="form-control input-custom" id="nome" placeholder="Insira seu nome">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control input-custom" id="email" placeholder="Insira seu email">
                        </div>

                        <div class="mb-3">
                            <label for="senha" class="form-label fw-bold">Senha</label>
                            <input type="password" class="form-control input-custom" id="senha" placeholder="Crie uma senha forte">
                        </div>

                        <div class="mb-4">
                            <label for="confirmarSenha" class="form-label fw-bold">Confirmar Senha</label>
                            <input type="password" class="form-control input-custom" id="confirmarSenha" placeholder="Repita sua senha">
                        </div>

                        <button onclick="registrarUsuario(event)" class="btn btn-custom btn-purple w-100 mb-3 text-center">Criar Conta</button>
                        
                        <button type="button" class="btn btn-outline-custom w-100 mb-4 d-flex align-items-center justify-content-center gap-2">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" style="width: 20px;">
                            Ou cadastre-se com o Google
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted" style="font-size: 0.95rem;">Já tem uma conta?</span>
                        <a href="login.html" class="text-decoration-none fw-bold" style="color: var(--azul-escuro); font-size: 0.95rem;">Entrar</a>
                    </div>

                </div>
            </div>

            <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-ilustracao order-1 order-md-2">
                <img src="https://cdni.iconscout.com/illustration/premium/thumb/business-growth-4162740-3454659.png" alt="Ilustração Cadastro" class="img-fluid p-5" style="max-width: 80%;">
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script/auth.js"></script>
</body>
</html>
