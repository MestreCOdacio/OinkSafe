<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OINKSAFE</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style/login-style.css">
</head>
<body>

    <div class="container-fluid vh-100 p-0">
        <div class="row g-0 h-100">
            
            <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-ilustracao">
                <img src="https://cdni.iconscout.com/illustration/premium/thumb/piggy-bank-5304746-4440533.png" alt="Ilustração Oinksafe" class="img-fluid p-5" style="max-width: 80%;">
            </div>

            <div class="col-md-6 d-flex align-items-center justify-content-center bg-white">
                <div class="login-form-container w-100" style="max-width: 450px; padding: 2rem;">
                    
                    <h2 class="fw-bold mb-2">Bem-vindo(a) de volta!</h2>
                    <p class="text-muted mb-4">Por favor, insira seus dados.</p>

                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control input-custom" id="email" placeholder="Insira seu email">
                        </div>

                        <div class="mb-3">
                            <label for="senha" class="form-label fw-bold">Senha</label>
                            <input type="password" class="form-control input-custom" id="senha" placeholder="••••••••">
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input custom-checkbox" type="checkbox" id="lembrar" checked>
                                <label class="form-check-label text-muted" for="lembrar" style="font-size: 0.9rem;">
                                    Lembrar por 30 dias
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none fw-bold" style="color: var(--azul-escuro); font-size: 0.9rem;">Esqueceu a senha?</a>
                        </div>

                        <a href="cofrinho.html" class="btn btn-custom btn-purple w-100 mb-3 text-decoration-none text-center">Entrar</a>
                        
                        <button type="button" class="btn btn-outline-custom w-100 mb-4 d-flex align-items-center justify-content-center gap-2">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" style="width: 20px;">
                            Ou faça login com o Google
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted" style="font-size: 0.95rem;">Não tem uma conta?</span>
                        <a href="cadastro.html" class="text-decoration-none fw-bold" style="color: var(--azul-escuro); font-size: 0.95rem;">Cadastre-se</a>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
